<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='globals.css') }}">
</head>
<body>
    <!--Widgets -->
    <div class="d-flex flex-wrap gap-3 justify-content-center align-items-center m-1">
        <div class="system-widget text-center">
            <a href="{{ url_for('system.launch_app', app_name='zen') }}" class="btn btn-custom"><i class="bi bi-browser-chrome"></i></a>
            <a href="{{ url_for('system.launch_app', app_name='discord') }}" class="btn btn-custom"><i class="bi bi-discord"></i></a>
            <a href="{{ url_for('system.launch_app', app_name='steam') }}" class="btn btn-custom"><i class="bi bi-steam"></i></a>
            <br>
            <a href="{{ url_for('system.launch_app', app_name='vscode') }}" class="btn btn-custom mt-2"><i class="bi bi-code-slash"></i></a>
            <a href="{{ url_for('system.send_command', app_name='spotify') }}" class="btn btn-custom mt-2"><i class="bi bi-spotify"></i></a>
            <a href="{{ url_for('system.send_command', app_name='notepad') }}" class="btn btn-custom mt-2"><i class="bi bi-filetype-txt"></i></a>
        </div>
    </div>
    <div class="d-flex flex-wrap gap-3 justify-content-center align-items-center m-1">
        <div class="system-widget text-center">
            <a href="{{ url_for('system.send_command_route', command_name='shutdown') }}" class="btn btn-custom"><i class="bi bi-power"></i></a>
            <a href="{{ url_for('system.send_command_route', command_name='restart') }}" class="btn btn-custom"><i class="bi bi-bootstrap-reboot"></i></a>
            <br>
            <a href="{{ url_for('system.send_command_route', command_name='volume_mute') }}" class="btn btn-custom mt-2"><i class="bi bi-volume-mute-fill"></i></a>
        </div>
    </div>
    
    <!-- Navigation buttons -->
    <div class="bottom-container" id="nav-container">
        <a href="{{ url_for('index') }}" class="btn btn-custom"><i class="bi bi-alarm"></i></a>
        <a href="{{ url_for('system.system') }}" class="btn btn-custom"><i class="bi bi-pc-display-horizontal"></i></a>
        <button class="btn btn-custom" onclick="toggleNav()"><i class="bi bi-chevron-down"></i></button>
    </div>
    <!-- Toggle Navigation Button -->
    <button class="toggle-nav-btn" id="toggle-btn" onclick="toggleNav()">
        <i class="bi bi-chevron-up"></i>
    </button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
