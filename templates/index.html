<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='globals.css') }}">

</head>
<body>
    <div class="container centered-container" id="time-container">
        <h1 id="time">00:00:00</h1>
        <p id="date">Loading...</p>

    <!-- Navigation buttons -->
    <div class="bottom-container" id="nav-container">
        <a href="{{ url_for('index') }}" class="btn btn-custom"><i class="bi bi-alarm"></i></a>
        <a href="{{ url_for('system.system') }}" class="btn btn-custom"><i class="bi bi-pc-display-horizontal"></i></a>
        <button class="btn btn-custom" onclick="toggleNav()"><i class="bi bi-chevron-down"></i></button>
    </div>
    <!-- Toggle Navigation Button -->
    <button class="toggle-nav-btn" id="toggle-btn" onclick="toggleNav()">
        <i class="bi bi-chevron-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
